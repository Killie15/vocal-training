# Builds PulseBeat Learner and publishes APK to GitHub Releases when version bumps land on main.

name: PulseBeat release

on:
  push:
    branches: [main, master]
    paths:
      - "heart-rate-logger/**"
      - ".github/workflows/pulsebeat-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android command-line tools
        run: |
          set -eux
          SDK="$RUNNER_TEMP/android-sdk"
          mkdir -p "$SDK/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools "$SDK/cmdline-tools/latest"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Read app version
        id: version
        working-directory: heart-rate-logger
        shell: bash
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=pulsebeat-v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: heart-rate-logger
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare release assets
        working-directory: heart-rate-logger
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/pulsebeat.apk
          cat > release/manifest.json <<EOF
          {
            "versionCode": ${{ steps.version.outputs.code }},
            "versionName": "${{ steps.version.outputs.name }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pulsebeat.apk",
            "notes": "PulseBeat Learner v${{ steps.version.outputs.name }}"
          }
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PulseBeat ${{ steps.version.outputs.name }}
          body: Automatic OTA build for PulseBeat Learner
          files: heart-rate-logger/release/pulsebeat.apk
          make_latest: true

      - name: Commit manifest for phone OTA check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heart-rate-logger/release/manifest.json
          git diff --staged --quiet && echo "Manifest unchanged" && exit 0
          git commit -m "PulseBeat release v${{ steps.version.outputs.name }} [skip ci]"
          git push
