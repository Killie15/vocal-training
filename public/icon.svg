<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1b1235"/>
      <stop offset="100%" stop-color="#020206"/>
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Linear Gradients for Icons -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b927fc"/>
      <stop offset="100%" stop-color="#e100ff"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Box for App Icon -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)" stroke="#201a40" stroke-width="6"/>

  <!-- Treble Clef Silhouette (Purple Glow Background) -->
  <path d="M220 440 C170 440, 130 400, 130 350 C130 310, 160 280, 200 280 C230 280, 250 300, 250 330 C250 360, 220 380, 190 380 C180 380, 175 375, 170 370 C165 378, 160 385, 160 395 C160 415, 185 430, 220 430 C270 430, 290 380, 290 310 L290 120 L380 150 L380 100 L290 70 L290 40 L260 40 L260 320 C240 310, 210 310, 190 320 C160 330, 140 360, 140 390 C140 420, 170 440, 220 440 Z" fill="url(#neon-purple)" opacity="0.3" filter="url(#glow)"/>

  <!-- Glowing Paper Airplane (Vocal Flight) -->
  <g filter="url(#glow)">
    <path d="M360 180 L160 280 L230 300 L320 220 L250 310 L310 330 Z" fill="url(#neon-cyan)"/>
  </g>
  
  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#neon-cyan)" stroke-width="4" opacity="0.15" filter="url(#glow)"/>
</svg>
