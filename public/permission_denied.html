<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permission Required - PitchFlight</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #020206;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
    }
    .container {
      text-align: center;
      max-width: 320px;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .icon-wrapper {
      margin-bottom: 1.5rem;
    }
    .mic-icon {
      font-size: 4rem;
      background: linear-gradient(135deg, #ff007f, #b927fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(185, 39, 252, 0.5));
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 0.8rem 0;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #00f2fe, #b927fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 0.88rem;
      line-height: 1.5;
      color: #94a3b8;
      margin: 0 0 2rem 0;
    }
    .btn-grant {
      display: block;
      width: 100%;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #020206;
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-grant:active {
      transform: scale(0.98);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <i class="fa-solid fa-microphone-slash mic-icon"></i>
    </div>
    <h1>Microphone Required</h1>
    <p>PitchFlight needs microphone access to detect your vocal pitch and score training levels. The game cannot fly without it.</p>
    <a href="https://appassets.androidplatform.net/request-permission" class="btn-grant">
      Allow Microphone
    </a>
  </div>
</body>
</html>
